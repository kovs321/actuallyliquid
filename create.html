                        <svg id="previewImagePlaceholder" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-muted-foreground"><path d="M12 3v12"></path><path d="m17 8-5-5-5 5"></path><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path></svg>

<!-- Phantom Wallet + PumpPortal Integration -->
<script type="module">
  import { Connection, PublicKey, Transaction, SystemProgram } from 'https://esm.sh/@solana/web3.js@1.95.8';

  const API_BASE = window.location.hostname === 'localhost'
    ? 'http://localhost:3001'
    : 'https://server-production-9526.up.railway.app';

  const HELIUS_RPC = 'https://mainnet.helius-rpc.com/?api-key=a12a538e-a61e-40fc-8de8-113e37aeb005';
  const WALLET_KEY = 'connected_wallet';
  const connection = new Connection(HELIUS_RPC, 'confirmed');

  // State
  let walletPublicKey = null;
  let phantomProvider = null;
  let selectedFile = null;

  // DOM refs
  const connectBtn = document.getElementById('connectWalletBtn');
  const walletBtnText = document.getElementById('walletBtnText');
  const createBtn = document.getElementById('createCoinBtn');
  const createBtnText = document.getElementById('createBtnText');
  const statusMsg = document.getElementById('statusMsg');
  const imageInput = document.getElementById('imageInput');
  const imageDropZone = document.getElementById('imageDropZone');
  const selectFileBtn = document.getElementById('selectFileBtn');
  const imagePreview = document.getElementById('imagePreview');
  const uploadPrompt = document.getElementById('uploadPrompt');
  const previewImage = document.getElementById('previewImage');
  const previewImagePlaceholder = document.getElementById('previewImagePlaceholder');

  // Live preview
  document.getElementById('coinName').addEventListener('input', e => {
    document.getElementById('previewName').textContent = e.target.value || 'Coin Name';
    document.getElementById('nameCount').textContent = e.target.value.length + '/32';
  });
  document.getElementById('coinTicker').addEventListener('input', e => {
    document.getElementById('previewTicker').textContent = '$' + (e.target.value || 'TICKER');
    document.getElementById('tickerCount').textContent = e.target.value.length + '/16';
  });
  document.getElementById('coinDesc').addEventListener('input', e => {
    document.getElementById('previewDesc').textContent = e.target.value || 'Your coin description...';
    document.getElementById('descCount').textContent = e.target.value.length + '/256';
  });

  // Image handling
  selectFileBtn.addEventListener('click', () => imageInput.click());
  imageDropZone.addEventListener('click', (e) => {
    if (e.target === imageDropZone || e.target.closest('#uploadPrompt')) imageInput.click();
  });
  imageDropZone.addEventListener('dragover', e => { e.preventDefault(); imageDropZone.style.borderColor = '#a78bfa'; });
  imageDropZone.addEventListener('dragleave', () => { imageDropZone.style.borderColor = ''; });
  imageDropZone.addEventListener('drop', e => {
    e.preventDefault();
    imageDropZone.style.borderColor = '';
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  imageInput.addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  function handleFile(file) {
    if (file.size > 15 * 1024 * 1024) { showStatus('File too large (max 15MB)', 'error'); return; }
    selectedFile = file;
    const url = URL.createObjectURL(file);
    imagePreview.src = url;
    imagePreview.classList.remove('hidden');
    uploadPrompt.classList.add('hidden');
    previewImage.src = url;
    previewImage.classList.remove('hidden');
    previewImagePlaceholder.classList.add('hidden');
  }

  // ── Wallet helpers (matching deploy folder pattern) ──
  function getProvider() {
    return window?.phantom?.solana || window?.solana || null;
  }

  function onWalletConnected(pubkey) {
    walletPublicKey = pubkey;
    phantomProvider = getProvider();
    const addr = pubkey.toBase58();
    localStorage.setItem(WALLET_KEY, addr);
    walletBtnText.textContent = addr.slice(0, 4) + '...' + addr.slice(-4);
    createBtnText.textContent = 'Create Coin';
  }

  function onWalletDisconnected() {
    walletPublicKey = null;
    phantomProvider = null;
    localStorage.removeItem(WALLET_KEY);
    walletBtnText.textContent = 'Connect Wallet';
    createBtnText.textContent = 'Connect wallet to create';
  }

  // Auto-reconnect on page load (silent, onlyIfTrusted)
  (async () => {
    const provider = getProvider();
    if (!provider?.isPhantom) return;
    const stored = localStorage.getItem(WALLET_KEY);
    if (!stored) return;
    try {
      const resp = await provider.connect({ onlyIfTrusted: true });
      onWalletConnected(resp.publicKey);
    } catch {}

    // Listen for account changes
    provider.on('accountChanged', (pk) => {
      if (pk) onWalletConnected(pk);
      else onWalletDisconnected();
    });
    provider.on('disconnect', onWalletDisconnected);
  })();

  // Wallet connect button
  connectBtn.addEventListener('click', async () => {
    if (walletPublicKey) {
      const provider = getProvider();
      await provider?.disconnect();
      onWalletDisconnected();
      return;
    }
    const provider = getProvider();
    if (!provider?.isPhantom) {
      showStatus('Please install Phantom wallet', 'error');
      window.open('https://phantom.app/', '_blank');
      return;
    }
    try {
      const resp = await provider.connect();
      onWalletConnected(resp.publicKey);
      showStatus('Wallet connected!', 'success');
    } catch (err) {
      showStatus('Wallet connection failed: ' + err.message, 'error');
    }
  });

  // ── CREATE COIN FLOW ──
  createBtn.addEventListener('click', async () => {
    if (!walletPublicKey) { connectBtn.click(); return; }

    const name = document.getElementById('coinName').value.trim();
    const symbol = document.getElementById('coinTicker').value.trim();
    const description = document.getElementById('coinDesc').value.trim();
    const website = document.getElementById('coinWebsite').value.trim();
    const twitter = document.getElementById('coinTwitter').value.trim();
    const telegram = document.getElementById('coinTelegram').value.trim();
    const devBuy = parseFloat(document.getElementById('devBuyAmount').value) || 0;

    if (!name) { showStatus('Enter a coin name', 'error'); return; }
    if (!symbol) { showStatus('Enter a ticker', 'error'); return; }
    if (!selectedFile) { showStatus('Upload an image', 'error'); return; }

    createBtn.disabled = true;

    try {
      // ── STEP 1: Create PumpPortal wallet ──
      createBtnText.textContent = 'Creating deploy wallet...';
      const walletResp = await fetch(API_BASE + '/api/create-wallet', { method: 'POST' });
      if (!walletResp.ok) throw new Error('Failed to create wallet');
      const { sessionId, walletPublicKey: deployWallet, privateKey: deployPrivateKey } = await walletResp.json();

      // ── STEP 2: Show private key to user ──
      showPrivateKey(deployWallet, deployPrivateKey);

      // ── STEP 3: Send SOL from Phantom to deploy wallet ──
      // 0.01 SOL for fees + devBuy amount
      const totalSol = 0.02 + devBuy;
      createBtnText.textContent = `Sending ${totalSol} SOL to deploy wallet...`;

      const tx = new Transaction().add(
        SystemProgram.transfer({
          fromPubkey: walletPublicKey,
          toPubkey: new PublicKey(deployWallet),
          lamports: Math.round(totalSol * 1e9),
        })
      );
      tx.feePayer = walletPublicKey;
      const { blockhash } = await connection.getLatestBlockhash('confirmed');
      tx.recentBlockhash = blockhash;

      const { signature: fundingSig } = await phantomProvider.signAndSendTransaction(tx);
      showStatus('Funding TX sent: ' + fundingSig, 'success');

      // Wait for funding confirmation
      createBtnText.textContent = 'Waiting for funding confirmation...';
      await connection.confirmTransaction(fundingSig, 'confirmed');

      // ── STEP 4: Upload image to server ──
      createBtnText.textContent = 'Uploading image...';
      const imgForm = new FormData();
      imgForm.append('file', selectedFile);
      const imgResp = await fetch(API_BASE + '/api/upload-image', { method: 'POST', body: imgForm });
      if (!imgResp.ok) throw new Error('Image upload failed');
      const { filename: imageFilename } = await imgResp.json();

      // ── STEP 5: Launch token via server (PumpPortal API) ──
      createBtnText.textContent = 'Launching token on pump.fun...';
      const launchResp = await fetch(API_BASE + '/api/launch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionId,
          name, symbol, description,
          twitter, telegram, website,
          devBuyAmount: devBuy,
          imageFilename,
          userWallet: walletPublicKey.toBase58(),
        }),
      });

      if (!launchResp.ok) {
        const err = await launchResp.json();
        throw new Error(err.error || 'Launch failed');
      }

      const { mintAddress, txSignature, pumpUrl } = await launchResp.json();

      // ── SUCCESS ──
      createBtnText.textContent = 'Token Created!';
      showStatus(`Token live! Mint: ${mintAddress}`, 'success');

      // Show result panel
      showResult(mintAddress, txSignature, pumpUrl, deployWallet, deployPrivateKey);

    } catch (err) {
      showStatus('Error: ' + err.message, 'error');
      createBtnText.textContent = 'Create Coin';
    } finally {
      createBtn.disabled = false;
    }
  });

  // ── Show private key modal ──
  function showPrivateKey(wallet, privateKey) {
    // Remove existing if any
    document.getElementById('pkModal')?.remove();

    const modal = document.createElement('div');
    modal.id = 'pkModal';
    modal.innerHTML = `
      <div style="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem;">
        <div style="background:hsl(220,25%,10%);border:1px solid hsl(215,20%,17%);max-width:500px;width:100%;padding:1.5rem;">
          <h3 style="color:#f0fdf4;font-size:1rem;font-weight:700;margin-bottom:0.75rem;">⚠ Save Your Deploy Wallet</h3>
          <p style="color:hsl(215,20%,55%);font-size:0.75rem;margin-bottom:1rem;">This is the wallet deploying your token. Save the private key — we do NOT store it.</p>
          <div style="margin-bottom:0.75rem;">
            <label style="color:hsl(215,20%,55%);font-size:0.7rem;">Wallet Address</label>
            <div style="background:hsl(215,20%,15%);border:1px solid hsl(215,20%,17%);padding:0.5rem;font-size:0.7rem;color:#f0fdf4;word-break:break-all;font-family:monospace;">${wallet}</div>
          </div>
          <div style="margin-bottom:1rem;">
            <label style="color:hsl(215,20%,55%);font-size:0.7rem;">Private Key (SAVE THIS!)</label>
            <div style="background:#7f1d1d;border:1px solid #991b1b;padding:0.5rem;font-size:0.7rem;color:#fca5a5;word-break:break-all;font-family:monospace;cursor:pointer;" onclick="navigator.clipboard.writeText('${privateKey}');this.style.borderColor='#22c55e';setTimeout(()=>this.style.borderColor='#991b1b',1500)">${privateKey}<br><span style="color:#ef4444;font-size:0.6rem;">Click to copy</span></div>
          </div>
          <button onclick="document.getElementById('pkModal').remove()" style="width:100%;padding:0.5rem;background:#8b5cf6;color:white;font-weight:600;font-size:0.8rem;border:none;cursor:pointer;">I've saved it — continue</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  }

  // ── Show result after token creation ──
  function showResult(mint, sig, pumpUrl, wallet, pk) {
    document.getElementById('pkModal')?.remove();

    const el = document.getElementById('statusMsg');
    el.classList.remove('hidden');
    el.innerHTML = `
      <div style="text-align:left;">
        <p style="color:#22c55e;font-weight:700;margin-bottom:0.5rem;">Token Created Successfully!</p>
        <div style="font-size:0.7rem;color:hsl(215,20%,55%);margin-bottom:0.25rem;">Mint Address</div>
        <div style="font-size:0.75rem;color:#f0fdf4;word-break:break-all;font-family:monospace;margin-bottom:0.5rem;">${mint}</div>
        <div style="font-size:0.7rem;color:hsl(215,20%,55%);margin-bottom:0.25rem;">TX Signature</div>
        <div style="font-size:0.75rem;color:#f0fdf4;word-break:break-all;font-family:monospace;margin-bottom:0.5rem;">${sig}</div>
        <div style="display:flex;gap:0.5rem;margin-top:0.75rem;">
          <a href="${pumpUrl}" target="_blank" style="flex:1;text-align:center;padding:0.4rem;background:#8b5cf6;color:white;font-size:0.75rem;font-weight:600;text-decoration:none;">View on Pump.fun</a>
          <a href="/trade?mint=${mint}" style="flex:1;text-align:center;padding:0.4rem;background:#06b6d4;color:white;font-size:0.75rem;font-weight:600;text-decoration:none;">Trade Here</a>
        </div>
        <div style="margin-top:0.75rem;font-size:0.65rem;color:#ef4444;">Deploy wallet private key: <span style="font-family:monospace;cursor:pointer;text-decoration:underline;" onclick="navigator.clipboard.writeText('${pk}')">${pk.slice(0,8)}...${pk.slice(-8)} (click to copy)</span></div>
      </div>
    `;
    el.className = 'text-sm p-4 border border-green-500/30 bg-green-400/5 mt-4';
  }

  function showStatus(msg, type) {
    statusMsg.classList.remove('hidden');
    statusMsg.textContent = msg;
    statusMsg.className = 'text-center text-sm p-3 border border-border ' +
      (type === 'error' ? 'text-red-400 bg-red-400/10' : 'text-green-400 bg-green-400/10');
    if (type === 'error') setTimeout(() => statusMsg.classList.add('hidden'), 8000);
  }
</script>
</body></html>
