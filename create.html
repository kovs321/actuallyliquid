<!-- Phantom Wallet + Pump.fun Integration -->
<script type="module">
  // State
  let walletPublicKey = null;
  let selectedFile = null;

  // DOM refs
  const connectBtn = document.getElementById('connectWalletBtn');
  const walletBtnText = document.getElementById('walletBtnText');
  const createBtn = document.getElementById('createCoinBtn');
  const createBtnText = document.getElementById('createBtnText');
  const statusMsg = document.getElementById('statusMsg');
  const imageInput = document.getElementById('imageInput');
  const imageDropZone = document.getElementById('imageDropZone');
  const selectFileBtn = document.getElementById('selectFileBtn');
  const imagePreview = document.getElementById('imagePreview');
  const uploadPrompt = document.getElementById('uploadPrompt');
  const previewImage = document.getElementById('previewImage');
  const previewImagePlaceholder = document.getElementById('previewImagePlaceholder');

  // Live preview
  document.getElementById('coinName').addEventListener('input', e => {
    document.getElementById('previewName').textContent = e.target.value || 'Coin Name';
    document.getElementById('nameCount').textContent = e.target.value.length + '/32';
  });
  document.getElementById('coinTicker').addEventListener('input', e => {
    document.getElementById('previewTicker').textContent = '$' + (e.target.value || 'TICKER');
    document.getElementById('tickerCount').textContent = e.target.value.length + '/16';
  });
  document.getElementById('coinDesc').addEventListener('input', e => {
    document.getElementById('previewDesc').textContent = e.target.value || 'Your coin description...';
    document.getElementById('descCount').textContent = e.target.value.length + '/256';
  });

  // Image handling
  selectFileBtn.addEventListener('click', () => imageInput.click());
  imageDropZone.addEventListener('click', (e) => {
    if (e.target === imageDropZone || e.target.closest('#uploadPrompt')) imageInput.click();
  });

  imageDropZone.addEventListener('dragover', e => { e.preventDefault(); imageDropZone.style.borderColor = '#a78bfa'; });
  imageDropZone.addEventListener('dragleave', () => { imageDropZone.style.borderColor = ''; });
  imageDropZone.addEventListener('drop', e => {
    e.preventDefault();
    imageDropZone.style.borderColor = '';
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  imageInput.addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  function handleFile(file) {
    if (file.size > 15 * 1024 * 1024) { showStatus('File too large (max 15MB)', 'error'); return; }
    selectedFile = file;
    const url = URL.createObjectURL(file);
    imagePreview.src = url;
    imagePreview.classList.remove('hidden');
    uploadPrompt.classList.add('hidden');
    previewImage.src = url;
    previewImage.classList.remove('hidden');
    previewImagePlaceholder.classList.add('hidden');
  }

  // Wallet connect (Phantom)
  connectBtn.addEventListener('click', async () => {
    if (walletPublicKey) { walletPublicKey = null; walletBtnText.textContent = 'Connect Wallet'; createBtnText.textContent = 'Connect wallet to create'; return; }
    try {
      const provider = window?.phantom?.solana || window?.solana;
      if (!provider?.isPhantom) { showStatus('Please install Phantom wallet', 'error'); window.open('https://phantom.app/', '_blank'); return; }
      const resp = await provider.connect();
      walletPublicKey = resp.publicKey.toString();
      walletBtnText.textContent = walletPublicKey.slice(0, 4) + '...' + walletPublicKey.slice(-4);
      createBtnText.textContent = 'Create Coin';
      showStatus('Wallet connected!', 'success');
    } catch (err) {
      showStatus('Wallet connection failed: ' + err.message, 'error');
    }
  });

  // Create coin via pump.fun
  createBtn.addEventListener('click', async () => {
    if (!walletPublicKey) { connectBtn.click(); return; }

    const name = document.getElementById('coinName').value.trim();
    const symbol = document.getElementById('coinTicker').value.trim();
    const description = document.getElementById('coinDesc').value.trim();
    const website = document.getElementById('coinWebsite').value.trim();
    const twitter = document.getElementById('coinTwitter').value.trim();
    const telegram = document.getElementById('coinTelegram').value.trim();
    const devBuy = parseFloat(document.getElementById('devBuyAmount').value) || 0;

    if (!name) { showStatus('Please enter a coin name', 'error'); return; }
    if (!symbol) { showStatus('Please enter a ticker', 'error'); return; }
    if (!selectedFile) { showStatus('Please upload an image', 'error'); return; }

    createBtnText.textContent = 'Uploading metadata...';
    createBtn.disabled = true;

    try {
      // 1. Upload to IPFS via pump.fun
      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('name', name);
      formData.append('symbol', symbol);
      formData.append('description', description);
      if (twitter) formData.append('twitter', twitter);
      if (telegram) formData.append('telegram', telegram);
      if (website) formData.append('website', website);
      formData.append('showName', 'true');

      const metaResp = await fetch('https://pump.fun/api/ipfs', { method: 'POST', body: formData });
      if (!metaResp.ok) throw new Error('IPFS upload failed');
      const metaJSON = await metaResp.json();

      createBtnText.textContent = 'Requesting transaction...';

      // 2. Get transaction from pumpportal (local signing)
      const tradeResp = await fetch('https://pumpportal.fun/api/trade-local', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          publicKey: walletPublicKey,
          action: 'create',
          tokenMetadata: {
            name: metaJSON.metadata.name,
            symbol: metaJSON.metadata.symbol,
            uri: metaJSON.metadataUri
          },
          mint: '', // will be generated server-side
          denominatedInSol: 'true',
          amount: devBuy,
          slippage: 10,
          priorityFee: 0.0005,
          pool: 'pump'
        })
      });

      if (!tradeResp.ok) throw new Error('Failed to generate transaction: ' + tradeResp.statusText);

      createBtnText.textContent = 'Approve in wallet...';

      // 3. Sign with Phantom
      const txData = await tradeResp.arrayBuffer();
      const provider = window.phantom?.solana || window.solana;

      // Deserialize and sign
      const { VersionedTransaction } = await import('https://esm.sh/@solana/web3.js@1.95.8');
      const tx = VersionedTransaction.deserialize(new Uint8Array(txData));
      const signedTx = await provider.signTransaction(tx);

      createBtnText.textContent = 'Sending transaction...';

      // 4. Send via Phantom
      const signature = await provider.signAndSendTransaction
        ? (await provider.signAndSendTransaction(tx)).signature
        : null;

      if (signature) {
        showStatus('Token created! TX: ' + signature, 'success');
        createBtnText.textContent = 'Created!';
      } else {
        // Fallback: send raw
        const connection = new (await import('https://esm.sh/@solana/web3.js@1.95.8')).Connection('https://api.mainnet-beta.solana.com', 'confirmed');
        const sig = await connection.sendRawTransaction(signedTx.serialize());
        showStatus('Token created! TX: ' + sig, 'success');
        createBtnText.textContent = 'Created!';
      }

    } catch (err) {
      showStatus('Error: ' + err.message, 'error');
      createBtnText.textContent = 'Create Coin';
    } finally {
      createBtn.disabled = false;
    }
  });

  function showStatus(msg, type) {
    statusMsg.classList.remove('hidden');
    statusMsg.textContent = msg;
    statusMsg.className = 'text-center text-sm p-3 border border-border ' +
      (type === 'error' ? 'text-red-400 bg-red-400/10' : 'text-green-400 bg-green-400/10');
    setTimeout(() => statusMsg.classList.add('hidden'), 8000);
  }
</script>
</body></html>
