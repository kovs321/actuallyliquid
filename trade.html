<script type="module">
import {
  Connection, PublicKey, TransactionInstruction, TransactionMessage,
  VersionedTransaction, SystemProgram, ComputeBudgetProgram
} from 'https://esm.sh/@solana/web3.js@1.95.8';

// ── Constants (from solbot) ──
const PUMP_PROGRAM = new PublicKey('6EF8rrecthR5Dkzon8Nwu78hRvfCKubJ14M5uBEwF6P');
const PUMP_FEE_PROGRAM = new PublicKey('pfeeUxB6jkeY1Hxd7CsFCAjcbHA9rWtchMGdZ6VojVZ');
const TOKEN_2022 = new PublicKey('TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb');
const ASSOC_TOKEN = new PublicKey('ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL');
const SYS_PROGRAM = new PublicKey('11111111111111111111111111111111');
const PUMP_GLOBAL = new PublicKey('4wTV1YmiEkRvAtNtsSGPtUrqRYQMe5SKy2uB4Jjaxnjf');
const PUMP_FEE_RECIPIENT = new PublicKey('62qc2CNXwrYqQScmEdiZFFAnJR262PxWEuNQtxfafNgV');
const PUMP_EVENT_AUTH = new PublicKey('Ce6TQqeHC9p8KetsN6JsjHK7UTZk7nasjjnr7XxXp9F1');
const PUMP_FEE_CONFIG = new PublicKey('8Wf5TiAheLUqBrKXeYg2JtAFFMWtKdG2BSFgqUcPVwTt');

const BUY_EXACT_SOL_DISC = new Uint8Array([56, 252, 116, 8, 158, 223, 205, 95]);
const SELL_DISC = new Uint8Array([51, 230, 133, 164, 1, 127, 131, 173]);

const RPC = 'https://api.mainnet-beta.solana.com';
const connection = new Connection(RPC, 'confirmed');

// ── State ──
let walletPubkey = null;
let provider = null;
let bondingCurveState = null;
let userTokenBalance = 0n;
let userTokenAccount = null;

// ── PDA helpers (matching solbot/src/parser/accounts.ts) ──
function deriveBondingCurve(mint) {
  return PublicKey.findProgramAddressSync([new TextEncoder().encode('bonding-curve'), mint.toBytes()], PUMP_PROGRAM);
}
function deriveBondingCurveVault(bc, mint) {
  return PublicKey.findProgramAddressSync([bc.toBytes(), TOKEN_2022.toBytes(), mint.toBytes()], ASSOC_TOKEN)[0];
}
function deriveCreatorVault(creator) {
  return PublicKey.findProgramAddressSync([new TextEncoder().encode('creator-vault'), creator.toBytes()], PUMP_PROGRAM);
}
function deriveGlobalVolume() {
  return PublicKey.findProgramAddressSync([new TextEncoder().encode('global_volume_accumulator')], PUMP_PROGRAM);
}
function deriveUserVolume(user) {
  return PublicKey.findProgramAddressSync([new TextEncoder().encode('user_volume_accumulator'), user.toBytes()], PUMP_PROGRAM);
}
function deriveBondingCurveV2(mint) {
  return PublicKey.findProgramAddressSync([new TextEncoder().encode('bonding-curve-v2'), mint.toBytes()], PUMP_PROGRAM);
}
function deriveATA(owner, mint, tokenProgram = TOKEN_2022) {
  return PublicKey.findProgramAddressSync([owner.toBytes(), tokenProgram.toBytes(), mint.toBytes()], ASSOC_TOKEN)[0];
}

// ── Bonding curve math (from solbot/src/utils/math.ts) ──
function tokensForSol(solLamports, vSol, vToken) {
  return (vToken * solLamports) / (vSol + solLamports);
}
function solForTokens(tokenAmount, vSol, vToken) {
  return (vSol * tokenAmount) / (vToken + tokenAmount);
}

// ── Instruction encoding ──
function encodeBuyExactSolIn(solLamports, minTokensOut) {
  const data = new ArrayBuffer(24);
  const view = new DataView(data);
  new Uint8Array(data).set(BUY_EXACT_SOL_DISC, 0);
  view.setBigUint64(8, solLamports, true);
  view.setBigUint64(16, minTokensOut, true);
  return new Uint8Array(data);
}
function encodeSell(tokenAmount, minSolOut) {
  const data = new ArrayBuffer(24);
  const view = new DataView(data);
  new Uint8Array(data).set(SELL_DISC, 0);
  view.setBigUint64(8, tokenAmount, true);
  view.setBigUint64(16, minSolOut, true);
  return new Uint8Array(data);
}

// ── InitializeAccount3 instruction (Token2022 opcode 18) ──
function createInitAccount3Ix(account, mint, owner) {
  const data = new Uint8Array(33);
  data[0] = 18;
  data.set(owner.toBytes(), 1);
  return new TransactionInstruction({
    programId: TOKEN_2022,
    keys: [
      { pubkey: account, isSigner: false, isWritable: true },
      { pubkey: mint, isSigner: false, isWritable: false },
    ],
    data,
  });
}

// ── Close account instruction (Token2022 opcode 9) ──
function createCloseAccountIx(account, dest, owner) {
  return new TransactionInstruction({
    programId: TOKEN_2022,
    keys: [
      { pubkey: account, isSigner: false, isWritable: true },
      { pubkey: dest, isSigner: false, isWritable: true },
      { pubkey: owner, isSigner: true, isWritable: false },
    ],
    data: new Uint8Array([9]),
  });
}

// ── Parse bonding curve on-chain data ──
function parseBondingCurve(data, mint, bcPubkey) {
  const buf = new DataView(data.buffer, data.byteOffset, data.byteLength);
  const off = 8; // skip discriminator
  const virtualTokenReserves = buf.getBigUint64(off, true);
  const virtualSolReserves = buf.getBigUint64(off + 8, true);
  const realTokenReserves = buf.getBigUint64(off + 16, true);
  const realSolReserves = buf.getBigUint64(off + 24, true);
  const tokenTotalSupply = buf.getBigUint64(off + 32, true);
  const complete = data[off + 40] === 1;
  const creator = new PublicKey(data.slice(49, 81));
  const isCashbackCoin = data.length > 82 ? data[82] === 1 : false;
  return { mint, bondingCurve: bcPubkey, creator, virtualTokenReserves, virtualSolReserves, realTokenReserves, realSolReserves, tokenTotalSupply, complete, isCashbackCoin };
}

// ── Load token ──
document.getElementById('loadTokenBtn').addEventListener('click', loadToken);
document.getElementById('mintAddress').addEventListener('keydown', e => { if (e.key === 'Enter') loadToken(); });

async function loadToken() {
  const mintStr = document.getElementById('mintAddress').value.trim();
  if (!mintStr) { showStatus('Enter a mint address', 'error'); return; }

  let mintPubkey;
  try { mintPubkey = new PublicKey(mintStr); } catch { showStatus('Invalid mint address', 'error'); return; }

  showStatus('Loading bonding curve...', 'info');

  try {
    const [bcPubkey] = deriveBondingCurve(mintPubkey);
    const acctInfo = await connection.getAccountInfo(bcPubkey);
    if (!acctInfo?.data) { showStatus('Bonding curve not found — is this a pump.fun token?', 'error'); return; }

    const data = new Uint8Array(acctInfo.data);
    bondingCurveState = parseBondingCurve(data, mintPubkey, bcPubkey);

    if (bondingCurveState.complete) {
      document.getElementById('completeText').textContent = 'MIGRATED — trade on Raydium';
    }

    // Calculate price and MC
    const price = Number(bondingCurveState.virtualSolReserves) / Number(bondingCurveState.virtualTokenReserves);
    const mcLamports = (bondingCurveState.virtualSolReserves * bondingCurveState.tokenTotalSupply) / bondingCurveState.virtualTokenReserves;
    const mcSol = Number(mcLamports) / 1e9;

    // Progress: how much of the 85 SOL target has been filled
    const realSol = Number(bondingCurveState.realSolReserves) / 1e9;
    const progress = Math.min(100, (realSol / 85) * 100);

    document.getElementById('tokenName').textContent = mintStr.slice(0, 6) + '...' + mintStr.slice(-4);
    document.getElementById('tokenTicker').textContent = 'Pump.fun Token';
    document.getElementById('tokenPrice').textContent = (price * 1e3).toFixed(6) + ' mSOL';
    document.getElementById('tokenMC').textContent = mcSol.toFixed(2) + ' SOL';
    document.getElementById('progressBar').style.width = progress.toFixed(1) + '%';
    document.getElementById('progressText').textContent = progress.toFixed(1) + '% bonded (' + realSol.toFixed(2) + ' / 85 SOL)';

    document.getElementById('tokenInfo').classList.remove('hidden');
    document.getElementById('tradePanel').classList.remove('hidden');
    hideStatus();

    // Load user token balance if wallet connected
    if (walletPubkey) await loadBalances();
  } catch (err) {
    showStatus('Error: ' + err.message, 'error');
  }
}

// ── Wallet connect ──
document.getElementById('connectWalletBtn').addEventListener('click', async () => {
  if (walletPubkey) { walletPubkey = null; provider = null; document.getElementById('walletBtnText').textContent = 'Connect Wallet'; updateButtons(); return; }
  try {
    provider = window?.phantom?.solana || window?.solana;
    if (!provider?.isPhantom) { showStatus('Install Phantom wallet', 'error'); window.open('https://phantom.app/', '_blank'); return; }
    const resp = await provider.connect();
    walletPubkey = resp.publicKey;
    document.getElementById('walletBtnText').textContent = walletPubkey.toString().slice(0, 4) + '...' + walletPubkey.toString().slice(-4);
    updateButtons();
    if (bondingCurveState) await loadBalances();
  } catch (err) { showStatus('Wallet error: ' + err.message, 'error'); }
});

async function loadBalances() {
  if (!walletPubkey) return;
  // SOL balance
  const bal = await connection.getBalance(walletPubkey);
  document.getElementById('solBalance').textContent = 'Balance: ' + (bal / 1e9).toFixed(4) + ' SOL';

  // Token balance (Token2022 ATA)
  if (bondingCurveState) {
    const ata = deriveATA(walletPubkey, bondingCurveState.mint);
    userTokenAccount = ata;
    try {
      const tokenAcct = await connection.getTokenAccountBalance(ata);
      userTokenBalance = BigInt(tokenAcct.value.amount);
      document.getElementById('tokenBalance').textContent = 'Balance: ' + Number(userTokenBalance / 1000000n).toLocaleString() + ' tokens (click=max)';
    } catch {
      userTokenBalance = 0n;
      userTokenAccount = null;
      document.getElementById('tokenBalance').textContent = 'Balance: 0';
    }
  }
}

function updateButtons() {
  document.getElementById('buyBtn').disabled = !walletPubkey;
  document.getElementById('buyBtn').textContent = walletPubkey ? 'Buy' : 'Connect wallet to buy';
  document.getElementById('sellBtn').disabled = !walletPubkey;
  document.getElementById('sellBtn').textContent = walletPubkey ? 'Sell' : 'Connect wallet to sell';
}

// ── Tab switching ──
window.switchTab = function(tab) {
  document.getElementById('buyPanel').classList.toggle('hidden', tab !== 'buy');
  document.getElementById('sellPanel').classList.toggle('hidden', tab !== 'sell');
  document.getElementById('tabBuy').className = 'flex-1 py-2.5 text-sm font-semibold transition-colors ' + (tab === 'buy' ? 'tab-active' : 'tab-inactive');
  document.getElementById('tabSell').className = 'flex-1 py-2.5 text-sm font-semibold transition-colors ' + (tab === 'sell' ? 'tab-active' : 'tab-inactive');
};

// ── Sell helpers ──
window.sellPercent = function(pct) {
  const amount = userTokenBalance * BigInt(pct) / 100n;
  document.getElementById('sellAmount').value = (Number(amount) / 1e6).toString();
};
window.sellMax = function() { window.sellPercent(100); };

// ── BUY ──
document.getElementById('buyBtn').addEventListener('click', async () => {
  if (!walletPubkey || !bondingCurveState) return;
  const solAmount = parseFloat(document.getElementById('buyAmount').value);
  if (!solAmount || solAmount <= 0) { showStatus('Enter SOL amount', 'error'); return; }
  if (bondingCurveState.complete) { showStatus('Token migrated — trade on Raydium', 'error'); return; }

  const slippagePct = parseInt(document.getElementById('buySlippage').value) || 10;
  const solLamports = BigInt(Math.round(solAmount * 1e9));

  // Calculate min tokens out with slippage
  const expectedTokens = tokensForSol(solLamports, bondingCurveState.virtualSolReserves, bondingCurveState.virtualTokenReserves);
  const minTokensOut = expectedTokens - (expectedTokens * BigInt(slippagePct * 100) / 10000n);

  document.getElementById('buyBtn').textContent = 'Building tx...';
  document.getElementById('buyBtn').disabled = true;

  try {
    const mint = bondingCurveState.mint;
    const bc = bondingCurveState.bondingCurve;
    const bcVault = deriveBondingCurveVault(bc, mint);
    const [creatorVault] = deriveCreatorVault(bondingCurveState.creator);
    const [globalVol] = deriveGlobalVolume();
    const [userVol] = deriveUserVolume(walletPubkey);
    const [bcV2] = deriveBondingCurveV2(mint);

    // Create user token account (ATA via Token2022)
    const userATA = deriveATA(walletPubkey, mint);
    const instructions = [];

    // Compute budget
    instructions.push(ComputeBudgetProgram.setComputeUnitLimit({ units: 100000 }));
    instructions.push(ComputeBudgetProgram.setComputeUnitPrice({ microLamports: 100000 }));

    // Create ATA if it doesn't exist
    const ataInfo = await connection.getAccountInfo(userATA);
    if (!ataInfo) {
      instructions.push(new TransactionInstruction({
        programId: ASSOC_TOKEN,
        keys: [
          { pubkey: walletPubkey, isSigner: true, isWritable: true },
          { pubkey: userATA, isSigner: false, isWritable: true },
          { pubkey: walletPubkey, isSigner: false, isWritable: false },
          { pubkey: mint, isSigner: false, isWritable: false },
          { pubkey: SYS_PROGRAM, isSigner: false, isWritable: false },
          { pubkey: TOKEN_2022, isSigner: false, isWritable: false },
        ],
        data: new Uint8Array([]),
      }));
    }

    // buy_exact_sol_in instruction (17 accounts)
    instructions.push(new TransactionInstruction({
      programId: PUMP_PROGRAM,
      keys: [
        { pubkey: PUMP_GLOBAL, isSigner: false, isWritable: false },
        { pubkey: PUMP_FEE_RECIPIENT, isSigner: false, isWritable: true },
        { pubkey: mint, isSigner: false, isWritable: false },
        { pubkey: bc, isSigner: false, isWritable: true },
        { pubkey: bcVault, isSigner: false, isWritable: true },
        { pubkey: userATA, isSigner: false, isWritable: true },
        { pubkey: walletPubkey, isSigner: true, isWritable: true },
        { pubkey: SYS_PROGRAM, isSigner: false, isWritable: false },
        { pubkey: TOKEN_2022, isSigner: false, isWritable: false },
        { pubkey: creatorVault, isSigner: false, isWritable: true },
        { pubkey: PUMP_EVENT_AUTH, isSigner: false, isWritable: false },
        { pubkey: PUMP_PROGRAM, isSigner: false, isWritable: false },
        { pubkey: globalVol, isSigner: false, isWritable: false },
        { pubkey: userVol, isSigner: false, isWritable: true },
        { pubkey: PUMP_FEE_CONFIG, isSigner: false, isWritable: false },
        { pubkey: PUMP_FEE_PROGRAM, isSigner: false, isWritable: false },
        { pubkey: bcV2, isSigner: false, isWritable: false },
      ],
      data: encodeBuyExactSolIn(solLamports, minTokensOut),
    }));

    // Build versioned transaction
    const { blockhash } = await connection.getLatestBlockhash('confirmed');
    const msg = new TransactionMessage({
      payerKey: walletPubkey,
      recentBlockhash: blockhash,
      instructions,
    }).compileToV0Message();
    const tx = new VersionedTransaction(msg);

    document.getElementById('buyBtn').textContent = 'Approve in Phantom...';
    const signed = await provider.signTransaction(tx);
    document.getElementById('buyBtn').textContent = 'Sending...';

    const sig = await connection.sendRawTransaction(signed.serialize(), { skipPreflight: true, maxRetries: 3 });
    showStatus('Buy sent! TX: ' + sig, 'success');
    document.getElementById('buyBtn').textContent = 'Confirming...';

    await connection.confirmTransaction(sig, 'confirmed');
    showStatus('Buy confirmed! TX: ' + sig, 'success');
    await loadBalances();
    await loadToken(); // refresh curve state
  } catch (err) {
    showStatus('Buy failed: ' + err.message, 'error');
  } finally {
    document.getElementById('buyBtn').textContent = 'Buy';
    document.getElementById('buyBtn').disabled = false;
  }
});

// ── SELL ──
document.getElementById('sellBtn').addEventListener('click', async () => {
  if (!walletPubkey || !bondingCurveState) return;
  const tokenAmountInput = parseFloat(document.getElementById('sellAmount').value);
  if (!tokenAmountInput || tokenAmountInput <= 0) { showStatus('Enter token amount', 'error'); return; }

  const tokenAmount = BigInt(Math.round(tokenAmountInput * 1e6)); // 6 decimals
  if (tokenAmount > userTokenBalance) { showStatus('Insufficient token balance', 'error'); return; }

  const slippagePct = parseInt(document.getElementById('sellSlippage').value) || 10;
  const expectedSol = solForTokens(tokenAmount, bondingCurveState.virtualSolReserves, bondingCurveState.virtualTokenReserves);
  const minSolOut = expectedSol - (expectedSol * BigInt(slippagePct * 100) / 10000n);

  const sellingAll = tokenAmount >= userTokenBalance;

  document.getElementById('sellBtn').textContent = 'Building tx...';
  document.getElementById('sellBtn').disabled = true;

  try {
    const mint = bondingCurveState.mint;
    const bc = bondingCurveState.bondingCurve;
    const bcVault = deriveBondingCurveVault(bc, mint);
    const [creatorVault] = deriveCreatorVault(bondingCurveState.creator);
    const [bcV2] = deriveBondingCurveV2(mint);
    const [userVol] = deriveUserVolume(walletPubkey);

    const userATA = deriveATA(walletPubkey, mint);
    const instructions = [];

    instructions.push(ComputeBudgetProgram.setComputeUnitLimit({ units: 100000 }));
    instructions.push(ComputeBudgetProgram.setComputeUnitPrice({ microLamports: 100000 }));

    // Sell instruction (14-16 accounts)
    const sellKeys = [
      { pubkey: PUMP_GLOBAL, isSigner: false, isWritable: false },
      { pubkey: PUMP_FEE_RECIPIENT, isSigner: false, isWritable: true },
      { pubkey: mint, isSigner: false, isWritable: false },
      { pubkey: bc, isSigner: false, isWritable: true },
      { pubkey: bcVault, isSigner: false, isWritable: true },
      { pubkey: userATA, isSigner: false, isWritable: true },
      { pubkey: walletPubkey, isSigner: true, isWritable: true },
      { pubkey: SYS_PROGRAM, isSigner: false, isWritable: false },
      { pubkey: creatorVault, isSigner: false, isWritable: true },
      { pubkey: TOKEN_2022, isSigner: false, isWritable: false },
      { pubkey: PUMP_EVENT_AUTH, isSigner: false, isWritable: false },
      { pubkey: PUMP_PROGRAM, isSigner: false, isWritable: false },
      { pubkey: PUMP_FEE_CONFIG, isSigner: false, isWritable: false },
      { pubkey: PUMP_FEE_PROGRAM, isSigner: false, isWritable: false },
    ];

    // Cashback coins need user_volume_accumulator before bondingCurveV2
    if (bondingCurveState.isCashbackCoin) {
      sellKeys.push({ pubkey: userVol, isSigner: false, isWritable: true });
    }
    sellKeys.push({ pubkey: bcV2, isSigner: false, isWritable: false });

    instructions.push(new TransactionInstruction({
      programId: PUMP_PROGRAM,
      keys: sellKeys,
      data: encodeSell(tokenAmount, minSolOut),
    }));

    // Close token account if selling 100% (reclaim rent)
    if (sellingAll) {
      instructions.push(createCloseAccountIx(userATA, walletPubkey, walletPubkey));
    }

    const { blockhash } = await connection.getLatestBlockhash('confirmed');
    const msg = new TransactionMessage({
      payerKey: walletPubkey,
      recentBlockhash: blockhash,
      instructions,
    }).compileToV0Message();
    const tx = new VersionedTransaction(msg);

    document.getElementById('sellBtn').textContent = 'Approve in Phantom...';
    const signed = await provider.signTransaction(tx);
    document.getElementById('sellBtn').textContent = 'Sending...';

    const sig = await connection.sendRawTransaction(signed.serialize(), { skipPreflight: true, maxRetries: 3 });
    showStatus('Sell sent! TX: ' + sig, 'success');
    document.getElementById('sellBtn').textContent = 'Confirming...';

    await connection.confirmTransaction(sig, 'confirmed');
    showStatus('Sell confirmed! TX: ' + sig, 'success');
    await loadBalances();
    await loadToken();
  } catch (err) {
    showStatus('Sell failed: ' + err.message, 'error');
  } finally {
    document.getElementById('sellBtn').textContent = 'Sell';
    document.getElementById('sellBtn').disabled = false;
  }
});

// ── Estimate updates ──
document.getElementById('buyAmount').addEventListener('input', () => {
  if (!bondingCurveState) return;
  const sol = parseFloat(document.getElementById('buyAmount').value) || 0;
  const lamports = BigInt(Math.round(sol * 1e9));
  const tokens = tokensForSol(lamports, bondingCurveState.virtualSolReserves, bondingCurveState.virtualTokenReserves);
  document.getElementById('buyEstimate').textContent = sol > 0 ? '≈ ' + (Number(tokens) / 1e6).toLocaleString(undefined, {maximumFractionDigits: 2}) + ' tokens' : '';
});

document.getElementById('sellAmount').addEventListener('input', () => {
  if (!bondingCurveState) return;
  const tokens = parseFloat(document.getElementById('sellAmount').value) || 0;
  const tokenBig = BigInt(Math.round(tokens * 1e6));
  const sol = solForTokens(tokenBig, bondingCurveState.virtualSolReserves, bondingCurveState.virtualTokenReserves);
  document.getElementById('sellEstimate').textContent = tokens > 0 ? '≈ ' + (Number(sol) / 1e9).toFixed(6) + ' SOL' : '';
});

// ── Helpers ──
function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.classList.remove('hidden');
  el.textContent = msg;
  el.className = 'text-center text-sm p-3 border border-border mt-4 break-all ' +
    (type === 'error' ? 'text-red-400 bg-red-400/10' : type === 'info' ? 'text-blue-400 bg-blue-400/10' : 'text-green-400 bg-green-400/10');
  if (type !== 'info') setTimeout(() => el.classList.add('hidden'), 12000);
}
function hideStatus() { document.getElementById('statusMsg').classList.add('hidden'); }

// Check URL params for mint
const params = new URLSearchParams(window.location.search);
if (params.get('mint')) {
  document.getElementById('mintAddress').value = params.get('mint');
  loadToken();
}
</script>
</body></html>
