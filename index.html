<script>
// ── Wallet Connection (matching deploy folder pattern) ──
const WALLET_KEY = 'connected_wallet';
let walletAddress = null;

function getProvider() {
  return window?.phantom?.solana || window?.solana || null;
}

function updateWalletUI(address) {
  walletAddress = address;
  const short = address ? address.slice(0, 4) + '...' + address.slice(-4) : null;
  document.getElementById('walletBtnText').textContent = short || 'Connect Wallet';
  const mob = document.getElementById('walletBtnTextMobile');
  if (mob) mob.textContent = short || 'Connect';
}

async function tryReconnect() {
  const provider = getProvider();
  if (!provider?.isPhantom) return;
  const stored = localStorage.getItem(WALLET_KEY);
  if (!stored) return;
  try {
    const resp = await provider.connect({ onlyIfTrusted: true });
    const addr = resp.publicKey.toBase58();
    localStorage.setItem(WALLET_KEY, addr);
    updateWalletUI(addr);
  } catch {}
}

async function connectWallet() {
  if (walletAddress) {
    const provider = getProvider();
    await provider?.disconnect();
    localStorage.removeItem(WALLET_KEY);
    updateWalletUI(null);
    return;
  }
  const provider = getProvider();
  if (!provider?.isPhantom) {
    window.open('https://phantom.app/', '_blank');
    return;
  }
  try {
    const resp = await provider.connect();
    const addr = resp.publicKey.toBase58();
    localStorage.setItem(WALLET_KEY, addr);
    updateWalletUI(addr);
  } catch (err) {
    console.error('Wallet connect failed:', err);
  }
}

// Event listeners
document.getElementById('connectWalletBtn').addEventListener('click', connectWallet);
document.getElementById('connectWalletBtnMobile')?.addEventListener('click', connectWallet);

// Listen for account changes & disconnect
const provider = getProvider();
if (provider) {
  provider.on('accountChanged', (publicKey) => {
    if (publicKey) {
      const addr = publicKey.toBase58();
      localStorage.setItem(WALLET_KEY, addr);
      updateWalletUI(addr);
    } else {
      localStorage.removeItem(WALLET_KEY);
      updateWalletUI(null);
    }
  });
  provider.on('disconnect', () => {
    localStorage.removeItem(WALLET_KEY);
    updateWalletUI(null);
  });
}

// Auto-reconnect on load

// Runner threshold: >= 1/3 of 85 SOL bonding curve (~28.33 SOL)

function renderTokenCard(token) {

  const progress = token.progressPct != null ? `

function timeAgo(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

// Fetch bonding curve data for all tokens via RPC
async function fetchBondingCurves(tokens) {
  if (tokens.length === 0) return [];

  // Use getProgramAccounts would be slow. Instead, derive PDAs and batch fetch.
  // We need to compute PDAs client-side. Let's use a simpler approach:
  // fetch each token's bonding curve account individually via getAccountInfo
  // but batch them with getMultipleAccounts

  // Import PublicKey from solana/web3.js via ESM
  const { PublicKey } = await import('https://esm.sh/@solana/web3.js@1.95.8');
  const PUMP = new PublicKey(PUMP_PROGRAM);

  // Derive bonding curve PDAs for all tokens
  const pdas = tokens.map(t => {
    try {
      const mint = new PublicKey(t.mintAddress);
      const [bc] = PublicKey.findProgramAddressSync(
        [new TextEncoder().encode('bonding-curve'), mint.toBytes()],
        PUMP
      );
      return bc.toBase58();
    } catch { return null; }
  });

  // Batch fetch via getMultipleAccounts (max 100 per call)
  const results = [];
  for (let i = 0; i < pdas.length; i += 100) {
    const batch = pdas.slice(i, i + 100).filter(Boolean);
    if (batch.length === 0) { results.push(...new Array(Math.min(100, pdas.length - i)).fill(null)); continue; }
    try {
      const resp = await fetch(HELIUS_RPC, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          jsonrpc: '2.0', id: 1,
          method: 'getMultipleAccounts',
          params: [batch, { encoding: 'base64' }],
        }),
      });
      const data = await resp.json();
      const accounts = data?.result?.value || [];
      results.push(...accounts);
    } catch {
      results.push(...new Array(batch.length).fill(null));
    }
  }

  // Parse bonding curve data
  return tokens.map((token, idx) => {
    const acct = results[idx];
    if (!acct?.data?.[0]) return { ...token, category: 'new', mcSol: null, progressPct: null };

    try {
      const buf = Uint8Array.from(atob(acct.data[0]), c => c.charCodeAt(0));
      const view = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
      const off = 8; // skip discriminator
      const virtualTokenReserves = view.getBigUint64(off, true);
      const virtualSolReserves = view.getBigUint64(off + 8, true);
      const realTokenReserves = view.getBigUint64(off + 16, true);
      const realSolReserves = view.getBigUint64(off + 24, true);
      const tokenTotalSupply = view.getBigUint64(off + 32, true);
      const complete = buf[off + 40] === 1;

      const realSol = Number(realSolReserves) / 1e9;
      const mcLamports = (virtualSolReserves * tokenTotalSupply) / virtualTokenReserves;
      const mcSol = Number(mcLamports) / 1e9;
      const progressPct = Math.min(100, (realSol / 85) * 100);

      let category;
      if (FORCE_RUNNERS.includes(token.mintAddress)) {
        category = 'runners';
      } else if (complete) {
        category = 'migrated';
      } else if (realSol >= RUNNER_SOL_THRESHOLD) {
        category = 'runners';
      } else {
        category = 'new';
      }

      return { ...token, category, mcSol, progressPct, realSol };
    } catch {
      return { ...token, category: 'new', mcSol: null, progressPct: null };
    }
  });
}

async function loadTokens() {
  try {
    const resp = await fetch(API_BASE + '/api/tokens');
    if (!resp.ok) return;
    const { tokens } = await resp.json();

    // Fetch bonding curve data and categorize
    const enriched = await fetchBondingCurves(tokens);

    categorized = { new: [], runners: [], migrated: [] };
    for (const t of enriched) {
      categorized[t.category].push(t);
    }

    // Sort: runners and migrated by MC desc, new by createdAt desc (already sorted)
    categorized.runners.sort((a, b) => (b.mcSol || 0) - (a.mcSol || 0));
    categorized.migrated.sort((a, b) => (b.mcSol || 0) - (a.mcSol || 0));

    // Update desktop columns
    renderColumn(document.getElementById('newCoinsCol'), categorized.new, 'No new coins yet', true);
    renderColumn(document.getElementById('runnersCol'), categorized.runners, 'No runners yet', false);
    renderColumn(document.getElementById('migratedCol'), categorized.migrated, 'No migrated coins yet', false);

    // Update column counts
    const nc = categorized.new.length, rc = categorized.runners.length, mc = categorized.migrated.length;
    document.getElementById('newCount').textContent = `(${nc})`;
    document.getElementById('runnersCount').textContent = `(${rc})`;
    document.getElementById('migratedCount').textContent = `(${mc})`;
    const ncm = document.getElementById('newCountMob'); if (ncm) ncm.textContent = `(${nc})`;
    const rcm = document.getElementById('runnersCountMob'); if (rcm) rcm.textContent = `(${rc})`;
    const mcm = document.getElementById('migratedCountMob'); if (mcm) mcm.textContent = `(${mc})`;

    // Update mobile
    updateMobileColumn();

    // Fetch real MC from Helius getAsset (runs in background, updates labels)
    fetchMarketCaps(enriched);
  } catch (err) {
    console.error('Failed to load tokens:', err);
  }
}

// Fetch MC via Helius getAsset for all tokens with mint addresses
async function fetchMarketCaps(tokens) {
  const mints = tokens.filter(t => t.mintAddress).map(t => t.mintAddress);
  if (mints.length === 0) return;

  let needsRecat = false;

  // Batch getAsset calls (5 at a time to avoid rate limits)
  for (let i = 0; i < mints.length; i += 5) {
    const batch = mints.slice(i, i + 5);
    const requests = batch.map((mint, idx) => ({
      jsonrpc: '2.0', id: i + idx, method: 'getAsset', params: { id: mint },
    }));

    try {
      const resp = await fetch(HELIUS_RPC, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(requests),
      });
      const results = await resp.json();
      const arr = Array.isArray(results) ? results : [results];

      for (const r of arr) {
        if (!r?.result) continue;
        const mint = r.result.id;
        const token = tokens.find(t => t.mintAddress === mint);

        // Update name, symbol, image from DAS metadata
        const meta = r.result.content?.metadata;
        const img = r.result.content?.links?.image || r.result.content?.files?.[0]?.uri;
        if (token) {
          if (meta?.name) token.name = meta.name;
          if (meta?.symbol) token.symbol = meta.symbol;
          if (img) token.imageUrl = img;
          needsRecat = true; // re-render to show updated metadata
        }

        // MC from price info
        const priceInfo = r.result.token_info?.price_info;
        if (priceInfo?.price_per_token) {
          const supply = r.result.token_info?.supply;
          const decimals = r.result.token_info?.decimals || 6;
          const price = priceInfo.price_per_token;
          const mc = supply ? (price * supply / Math.pow(10, decimals)) : null;

          if (token && mc != null) {
            token.mcUsd = mc;
            if (mc > MIGRATED_MC_USD && !FORCE_RUNNERS.includes(mint)) {
              if (token.category !== 'migrated') {
                token.category = 'migrated';
              }
            }
          }

          // Update all MC labels for this mint
          const els = document.querySelectorAll(`[data-mc-mint="${mint}"]`);
          els.forEach(el => {
            if (mc != null && mc > 0) {
              const formatted = mc >= 1000000 ? '$' + (mc / 1000000).toFixed(2) + 'M'
                : mc >= 1000 ? '$' + (mc / 1000).toFixed(1) + 'K'
                : '$' + mc.toFixed(2);
              el.textContent = formatted;
              el.classList.remove('text-muted-foreground');
              el.classList.add(mc > 10000 ? 'text-green-400' : 'text-muted-foreground');
            }
          });
        }
      }
    } catch (err) {
      console.error('getAsset batch error:', err);
    }
  }

  // Re-categorize and re-render if any tokens moved to migrated
  if (needsRecat) {
    categorized = { new: [], runners: [], migrated: [] };
    for (const t of tokens) categorized[t.category].push(t);
    categorized.runners.sort((a, b) => (b.mcSol || 0) - (a.mcSol || 0));
    categorized.migrated.sort((a, b) => (b.mcUsd || b.mcSol || 0) - (a.mcUsd || a.mcSol || 0));

    renderColumn(document.getElementById('newCoinsCol'), categorized.new, 'No new coins yet', true);
    renderColumn(document.getElementById('runnersCol'), categorized.runners, 'No runners yet', false);
    renderColumn(document.getElementById('migratedCol'), categorized.migrated, 'No migrated coins yet', false);

    const nc = categorized.new.length, rc = categorized.runners.length, mc = categorized.migrated.length;
    document.getElementById('newCount').textContent = `(${nc})`;
    document.getElementById('runnersCount').textContent = `(${rc})`;
    document.getElementById('migratedCount').textContent = `(${mc})`;
    const ncm = document.getElementById('newCountMob'); if (ncm) ncm.textContent = `(${nc})`;
    const rcm = document.getElementById('runnersCountMob'); if (rcm) rcm.textContent = `(${rc})`;
    const mcm = document.getElementById('migratedCountMob'); if (mcm) mcm.textContent = `(${mc})`;
    updateMobileColumn();
  }
}

// Load tokens on page load and refresh every 30 seconds
loadTokens();
setInterval(loadTokens, 30000);

// Mobile column switcher
function switchColumn(col) {
  currentMobileTab = col;
  const btns = document.querySelectorAll('.lg\\:hidden.flex.border button');
  btns.forEach(b => { b.className = 'flex-1 py-2 text-xs font-medium transition-colors text-muted-foreground hover:text-foreground'; });
  const idx = col === 'new' ? 0 : col === 'runners' ? 1 : 2;
  btns[idx].className = 'flex-1 py-2 text-xs font-medium transition-colors bg-muted text-foreground';
  updateMobileColumn();
}
</script>
