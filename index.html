<html lang="en" class="dark"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Space Grotesk', 'system-ui', 'sans-serif'],
              pixel: ['Silkscreen', 'monospace'],
            },
            colors: {
              border: 'hsl(215, 20%, 17%)',
              background: 'hsl(220, 25%, 8%)',
              'background-header': 'hsl(220, 25%, 10%)',
              foreground: 'hsl(210, 40%, 98%)',
              card: 'hsl(220, 25%, 10%)',
              muted: { DEFAULT: 'hsl(215, 20%, 15%)', foreground: 'hsl(215, 20%, 55%)' },
              violet: { 400: '#a78bfa', 500: '#8b5cf6' },
            },
          },
        },
      }
    </script>
    <style>
      .btn-primary { background: #8b5cf6; color: white; border-radius: 4px; }
      .btn-primary:hover { background: #7c3aed; }
      .btn-accent { background: #06b6d4; color: white; border-radius: 4px; }
      .btn-accent:hover { background: #0891b2; }
      .font-pixel { font-family: 'Silkscreen', monospace; }
      .crt-scanlines { background-color: hsl(220, 25%, 8%); }
      .fixed-height-page { height: 100%; }
    </style>

    <title>actuallyliquid.fun</title>
    <meta name="description" content="Launch & Trade on pump.fun">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="crt-scanlines h-screen bg-background text-foreground flex flex-col overflow-hidden">
  <!-- Header -->
  <header class="z-50 w-full bg-background-header shrink-0">
    <div class="flex items-center justify-between px-4 sm:px-6 lg:px-12 xl:px-20 py-2 min-h-12 bg-muted/40">
      <div class="flex items-center gap-2">
        <a class="flex items-center gap-1 shrink-0" href="/">
          <span class="text-base font-bold tracking-tight font-pixel">actuallyliquid.fun</span>
        </a>
        <div class="hidden sm:block h-4 w-px bg-border mx-1"></div>
        <nav class="items-center hidden sm:flex">
          <a class="relative flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-violet-400" href="/">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5"><rect width="7" height="7" x="3" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="14" rx="1"></rect><rect width="7" height="7" x="3" y="14" rx="1"></rect></svg>
            <span>Home</span>
            <span class="absolute inset-x-0 bottom-0 h-0.5 bg-violet-500"></span>
          </a>
          <a class="relative flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-muted-foreground hover:text-foreground" href="/trade">
            <span>Trade</span>
          </a>
        </nav>
      </div>
      <div class="hidden sm:flex items-center gap-2 shrink-0">
        <a class="h-7 px-2 flex items-center gap-1 btn-primary border-0 text-xs font-semibold" href="/create">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>Create
        </a>
        <button id="connectWalletBtn" class="h-7 px-2.5 flex items-center gap-1.5 btn-accent border-0 text-xs font-semibold">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"></path><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"></path></svg>
          <span id="walletBtnText">Connect Wallet</span>
        </button>
      </div>
      <!-- Mobile -->
      <div class="sm:hidden flex items-center gap-2">
        <a class="h-7 px-2 flex items-center gap-1 btn-primary border-0 text-xs font-semibold" href="/create">+</a>
        <button id="connectWalletBtnMobile" class="h-7 px-2 flex items-center btn-accent border-0 text-xs font-semibold">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"></path><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"></path></svg>
          <span id="walletBtnTextMobile" class="ml-1">Connect</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="px-4 sm:px-6 lg:px-12 xl:px-20 py-4 sm:py-6 flex-1 min-h-0 pb-0 overflow-hidden">
    <div class="fixed-height-page pb-4">
      <div class="flex flex-col h-full">
        <!-- Mobile tabs -->
        <div class="lg:hidden flex border border-border bg-card mb-4 shrink-0">
          <button class="flex-1 py-2 text-xs font-medium transition-colors bg-muted text-foreground" onclick="switchColumn('new')">New</button>
          <button class="flex-1 py-2 text-xs font-medium transition-colors text-muted-foreground hover:text-foreground" onclick="switchColumn('runners')">Runners</button>
          <button class="flex-1 py-2 text-xs font-medium transition-colors text-muted-foreground hover:text-foreground" onclick="switchColumn('migrated')">Migrated</button>
        </div>

        <!-- Mobile single column -->
        <div class="lg:hidden flex-1 min-h-0" id="mobileColumn">
          <div class="flex flex-col bg-card border border-border h-full min-h-0 overflow-hidden">
            <div class="flex items-center justify-between px-3 py-2 border-b border-border shrink-0">
              <span class="text-xs font-bold text-foreground" id="mobileColTitle">New</span>
            </div>
            <div class="flex-1 overflow-y-auto min-h-0">
              <div class="p-2" id="mobileColContent">
                <div class="flex flex-col items-center justify-center border border-dashed border-border gap-2 py-8">
                  <p class="text-zinc-400 font-medium mb-1 text-xs">No new coins yet</p>
                  <a href="/create" class="text-violet-400 text-xs hover:underline">Be the first to create one</a>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Desktop 3-column -->
        <div class="hidden lg:grid lg:grid-cols-3 gap-4 h-full">
          <div class="flex flex-col bg-card border border-border h-full min-h-0 overflow-hidden">
            <div class="flex items-center justify-between px-3 py-2 border-b border-border shrink-0">
              <span class="text-xs font-bold text-foreground">New Coins</span>
            </div>
            <div class="flex-1 overflow-y-auto min-h-0">
              <div class="p-2" id="newCoinsCol">
                <div class="flex flex-col items-center justify-center border border-dashed border-border gap-2 py-8">
                  <p class="text-zinc-400 font-medium mb-1 text-xs">No new coins yet</p>
                  <a href="/create" class="text-violet-400 text-xs hover:underline">Be the first to create one</a>
                </div>
              </div>
            </div>
          </div>
          <div class="flex flex-col bg-card border border-border h-full min-h-0 overflow-hidden">
            <div class="flex items-center justify-between px-3 py-2 border-b border-border shrink-0">
              <span class="text-xs font-bold text-foreground">Runners</span>
            </div>
            <div class="flex-1 overflow-y-auto min-h-0">
              <div class="p-2">
                <div class="flex flex-col items-center justify-center border border-dashed border-border gap-2 py-8">
                  <p class="text-zinc-400 font-medium mb-1 text-xs">No runners yet</p>
                </div>
              </div>
            </div>
          </div>
          <div class="flex flex-col bg-card border border-border h-full min-h-0 overflow-hidden">
            <div class="flex items-center justify-between px-3 py-2 border-b border-border shrink-0">
              <span class="text-xs font-bold text-foreground">Migrated</span>
            </div>
            <div class="flex-1 overflow-y-auto min-h-0">
              <div class="p-2">
                <div class="flex flex-col items-center justify-center border border-dashed border-border gap-2 py-8">
                  <p class="text-zinc-400 font-medium mb-1 text-xs">No migrated coins yet</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-border bg-background-header shrink-0">
    <div class="px-4 sm:px-6 lg:px-12 xl:px-20 py-4 flex items-center justify-between gap-4">
      <span class="text-sm text-muted-foreground">© 2026 actuallyliquid.fun</span>
      <div class="flex items-center gap-4 text-sm">
        <a class="text-muted-foreground hover:text-foreground transition-colors" href="#">Docs</a>
        <span class="text-muted-foreground/50">•</span>
        <a class="text-muted-foreground hover:text-foreground transition-colors" href="#">Terms</a>
        <span class="text-muted-foreground/50">•</span>
        <a class="text-muted-foreground hover:text-foreground transition-colors" href="#">Privacy</a>
      </div>
    </div>
  </footer>
</div>

<script>
// ── Wallet Connection (matching deploy folder pattern) ──
const WALLET_KEY = 'connected_wallet';
let walletAddress = null;

function getProvider() {
  return window?.phantom?.solana || window?.solana || null;
}

function updateWalletUI(address) {
  walletAddress = address;
  const short = address ? address.slice(0, 4) + '...' + address.slice(-4) : null;
  document.getElementById('walletBtnText').textContent = short || 'Connect Wallet';
  const mob = document.getElementById('walletBtnTextMobile');
  if (mob) mob.textContent = short || 'Connect';
}

async function tryReconnect() {
  const provider = getProvider();
  if (!provider?.isPhantom) return;
  const stored = localStorage.getItem(WALLET_KEY);
  if (!stored) return;
  try {
    const resp = await provider.connect({ onlyIfTrusted: true });
    const addr = resp.publicKey.toBase58();
    localStorage.setItem(WALLET_KEY, addr);
    updateWalletUI(addr);
  } catch {}
}

async function connectWallet() {
  if (walletAddress) {
    const provider = getProvider();
    await provider?.disconnect();
    localStorage.removeItem(WALLET_KEY);
    updateWalletUI(null);
    return;
  }
  const provider = getProvider();
  if (!provider?.isPhantom) {
    window.open('https://phantom.app/', '_blank');
    return;
  }
  try {
    const resp = await provider.connect();
    const addr = resp.publicKey.toBase58();
    localStorage.setItem(WALLET_KEY, addr);
    updateWalletUI(addr);
  } catch (err) {
    console.error('Wallet connect failed:', err);
  }
}

// Event listeners
document.getElementById('connectWalletBtn').addEventListener('click', connectWallet);
document.getElementById('connectWalletBtnMobile')?.addEventListener('click', connectWallet);

// Listen for account changes & disconnect
const provider = getProvider();
if (provider) {
  provider.on('accountChanged', (publicKey) => {
    if (publicKey) {
      const addr = publicKey.toBase58();
      localStorage.setItem(WALLET_KEY, addr);
      updateWalletUI(addr);
    } else {
      localStorage.removeItem(WALLET_KEY);
      updateWalletUI(null);
    }
  });
  provider.on('disconnect', () => {
    localStorage.removeItem(WALLET_KEY);
    updateWalletUI(null);
  });
}

// Auto-reconnect on load
tryReconnect();

// ── Fetch and display launched tokens ──
const API_BASE = 'https://server-production-9526.up.railway.app';

function renderTokenCard(token) {
  const short = token.mintAddress ? token.mintAddress.slice(0, 6) + '...' + token.mintAddress.slice(-4) : '';
  const img = token.imageUrl
    ? `<img src="${token.imageUrl}" class="w-full h-full object-cover" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const fallback = `<div class="${token.imageUrl ? 'hidden' : 'flex'} items-center justify-center w-full h-full text-muted-foreground text-xs font-bold">${token.symbol?.slice(0,3) || '?'}</div>`;
  const ago = timeAgo(new Date(token.createdAt));
  return `
    <a href="/trade?mint=${token.mintAddress}" class="flex gap-3 p-2 border border-border hover:border-violet-500/50 transition-colors cursor-pointer">
      <div class="w-12 h-12 shrink-0 bg-muted border border-border overflow-hidden">${img}${fallback}</div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <span class="text-sm font-semibold text-foreground truncate">${token.name}</span>
          <span class="text-xs text-muted-foreground">$${token.symbol}</span>
        </div>
        <div class="flex items-center gap-2 mt-0.5">
          <span class="text-[10px] text-muted-foreground font-mono">${short}</span>
          <span class="text-[10px] text-muted-foreground">${ago}</span>
        </div>
      </div>
    </a>`;
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function renderEmpty(msg, showCreate) {
  return `<div class="flex flex-col items-center justify-center border border-dashed border-border gap-2 py-8">
    <p class="text-zinc-400 font-medium mb-1 text-xs">${msg}</p>
    ${showCreate ? '<a href="/create" class="text-violet-400 text-xs hover:underline">Be the first to create one</a>' : ''}
  </div>`;
}

async function loadTokens() {
  try {
    const resp = await fetch(API_BASE + '/api/tokens');
    if (!resp.ok) return;
    const { tokens } = await resp.json();

    // New Coins column (desktop)
    const newCol = document.getElementById('newCoinsCol');
    if (tokens.length > 0) {
      newCol.innerHTML = tokens.map(renderTokenCard).join('');
    } else {
      newCol.innerHTML = renderEmpty('No new coins yet', true);
    }

    // Mobile column
    const mobCol = document.getElementById('mobileColContent');
    if (tokens.length > 0) {
      mobCol.innerHTML = tokens.map(renderTokenCard).join('');
    } else {
      mobCol.innerHTML = renderEmpty('No new coins yet', true);
    }
  } catch (err) {
    console.error('Failed to load tokens:', err);
  }
}

// Load tokens on page load and refresh every 30 seconds
loadTokens();
setInterval(loadTokens, 30000);

// Mobile column switcher
function switchColumn(col) {
  const btns = document.querySelectorAll('.lg\\:hidden.flex.border button');
  btns.forEach(b => { b.className = 'flex-1 py-2 text-xs font-medium transition-colors text-muted-foreground hover:text-foreground'; });
  const idx = col === 'new' ? 0 : col === 'runners' ? 1 : 2;
  btns[idx].className = 'flex-1 py-2 text-xs font-medium transition-colors bg-muted text-foreground';
  const titles = { new: 'New', runners: 'Runners', migrated: 'Migrated' };
  document.getElementById('mobileColTitle').textContent = titles[col];
  if (col === 'new') {
    loadTokens();
  } else {
    const msgs = { runners: 'No runners yet', migrated: 'No migrated coins yet' };
    document.getElementById('mobileColContent').innerHTML = renderEmpty(msgs[col], false);
  }
}
</script>
</body></html>
